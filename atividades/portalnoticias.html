<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portal de Notícias</title>

<style>
    body {
        margin: center;
        font-family: Arial, Helvetica, sans-serif;
        background-color: #484D50;
    }

    .container {
        width: 80%;
        margin: auto;
        background: #484D50;
        padding: 70px;
        

    }

    .titulo {
        text-align: center;
        padding: 20px;
        background-color: #ffffff;
        margin-bottom: 20px;
        border-radius: 100px;
    }

    .principal {
        background-color: #ffffff;
        padding: 20px;
        margin-bottom: 20px;
        border-radius: 60px;
        text-align: center;
        
    }

    .noticias {
        display: flex;
        gap: 20px;
        margin: auto;
        text-align: center;
    }

    .noticia {
        background-color: #eee;
        padding: 50px;
        border-radius: 60px;
        width: 40%;
        margin: 20px;
        
    }
</style>
</head>

<body>

<div class="container">
    <div class="titulo">
        <h1> Catálogo de Produtos</h1>
    </div>

    <div class="principal">
        <h2>Notícia Principal</h2>
        <p>VODKA DE T.I TERCEIRAO ASSUMIU ALGO INCRIVEL.</p>
        <IMg:s></IMg:s>
    </div>

    <div class="noticias">
        <div class="noticia">
            <h3>Notícia 1</h3>
            <p>Vodka e Mateus se</p>
        </div>

        <div class="noticia">
            <h3>Notícia 2</h3>
            <p>blablabla.</p>
        </div>
    </div>

</div>

</body>
</html>
