<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minha Página</title>

    <style>
        body{
            background-color: rgb(178, 154, 201);

        }

        h1{
            color: rgb(92, 26, 26);
            text-align: center;
        }

        p{
            font-size: 20px;
        }

        div{
            background-color: rgb(173, 116, 226);
            padding: 15px;
            margin: 15px;
            border-bottom: 10px solid rgb(41, 12, 68);
            border-radius: 20px;
            transition: 0.1s;
        }

        div:hover{
            box-shadow: 5px 10px rgb(74, 51, 117);
        }

        h1:hover{
            color: blueviolet;
        }
    </style>
</head>

<body>
    <h1>Bem-vindo ao meu site</h1>
    <div>
        <h2>Sobre mim</h2>
        <p>Sou estudante de tecnologia.</p>
    </div>
    <div>
        <h2>Hobbies</h2>
        <p>Gosto de programação e jogos.</p>
    </div>
</body>

</html
